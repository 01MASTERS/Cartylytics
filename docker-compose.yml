# version: "3.9"

services:
  # ── MySQL ─────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: cartlytics_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE:      cartlytics
      MYSQL_USER:          cartlytics_user
      MYSQL_PASSWORD:      cartlytics_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seeds/001_seed_data.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cartlytics_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST:     db
      DB_PORT:     3306
      DB_USER:     cartlytics_user
      DB_PASSWORD: cartlytics_pass
      DB_NAME:     cartlytics
      DEBUG:       "false"
    ports:
      - "8000:8000"

  # ── React Frontend ────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: cartlytics_ui
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1

volumes:
  mysql_data:
